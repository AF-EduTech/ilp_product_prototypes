<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 420" width="1060" height="420"
     font-family="'Segoe UI', Helvetica, Arial, sans-serif">

  <!--
    RASTER
    ─────────────────────────────────────────────────────────────
    Gesamt:        1060 × 420
    Titelleiste:   y=0   h=44
    Kästen:        y=60  h=240  (alle gleich)
    Kästen-Mitte:  y=180
    Pfeile:        y=180
    Beschriftung:  y=322–342
    Hotspots:      cy=374

    5 Stationen, alle gleich breit:
      Station 1 (Datenquellen):  x=20   w=172  cx=106
      Pfeil 1→2:                 x=194  w=36
      Station 2 (SSIS):          x=232  w=172  cx=318
      Pfeil 2→3:                 x=406  w=36
      Station 3 (DB-Engine/DWH): x=444  w=172  cx=530
      Pfeil 3→4:                 x=618  w=36
      Station 4 (SSAS):          x=656  w=172  cx=742
      Pfeil 4→5:                 x=830  w=36
      Station 5 (SSRS):          x=868  w=172  cx=954
    ─────────────────────────────────────────────────────────────
  -->

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6c757d"/>
    </marker>
  </defs>

  <!-- Hintergrund -->
  <rect width="1060" height="420" rx="10" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1.5"/>

  <!-- Titelleiste -->
  <rect x="0" y="0" width="1060" height="44" rx="10" fill="#343a40"/>
  <rect x="0" y="30" width="1060" height="14" fill="#343a40"/>
  <text x="530" y="28" text-anchor="middle" fill="white" font-size="15" font-weight="700" letter-spacing="0.5">
    SQL Server – Datenfluss: Von der Quelle zum Bericht
  </text>

  <!-- Datenflusspfeil (Hintergrundlinie) -->
  <line x1="106" y1="180" x2="954" y2="180" stroke="#dee2e6" stroke-width="2" stroke-dasharray="6 4"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!--  STATION 1 – DATENQUELLEN  cx=106                      -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="20" y="60" width="172" height="240" rx="10" fill="white" stroke="#90caf9" stroke-width="2"/>
  <!-- Header -->
  <rect x="20" y="60" width="172" height="40" rx="10" fill="#1565c0"/>
  <rect x="20" y="80" width="172" height="20" fill="#1565c0"/>
  <text x="106" y="85" text-anchor="middle" fill="white" font-size="12" font-weight="700">① Datenquellen</text>

  <!-- Datenbank-Icon -->
  <ellipse cx="106" cy="138" rx="32" ry="10" fill="#bbdefb" stroke="#1976d2" stroke-width="1.5"/>
  <rect x="74" y="138" width="64" height="34" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
  <ellipse cx="106" cy="172" rx="32" ry="10" fill="#90caf9" stroke="#1976d2" stroke-width="1.5"/>
  <text x="106" y="159" text-anchor="middle" fill="#0d47a1" font-size="9" font-weight="600">DB</text>

  <!-- Datei-Icon -->
  <rect x="58" y="192" width="22" height="28" rx="3" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5"/>
  <polyline points="72,192 80,192 80,200 72,200" fill="#ffee58" stroke="#f9a825" stroke-width="1"/>
  <line x1="62" y1="205" x2="76" y2="205" stroke="#f57f17" stroke-width="1.2"/>
  <line x1="62" y1="210" x2="76" y2="210" stroke="#f57f17" stroke-width="1.2"/>
  <line x1="62" y1="215" x2="76" y2="215" stroke="#f57f17" stroke-width="1.2"/>

  <!-- App-Icon -->
  <rect x="106" y="192" width="28" height="28" rx="4" fill="#e8f5e9" stroke="#43a047" stroke-width="1.5"/>
  <rect x="110" y="196" width="20" height="12" rx="2" fill="#a5d6a7"/>
  <rect x="115" y="212" width="10" height="4" rx="1" fill="#43a047"/>

  <!-- Labels -->
  <text x="69"  y="230" text-anchor="middle" fill="#5d4037" font-size="9">CSV/XLS</text>
  <text x="120" y="230" text-anchor="middle" fill="#1b5e20" font-size="9">App</text>

  <text x="106" y="258" text-anchor="middle" fill="#374151" font-size="10">Externe Systeme,</text>
  <text x="106" y="272" text-anchor="middle" fill="#374151" font-size="10">Dateien, Datenbanken</text>
  <text x="106" y="289" text-anchor="middle" fill="#374151" font-size="10">Rohdaten-Quellen</text>

  <!-- Hotspot 1 -->
  <circle cx="106" cy="374" r="20" fill="#1565c0" stroke="white" stroke-width="2.5"/>
  <text x="106" y="380" text-anchor="middle" fill="white" font-size="14" font-weight="800">1</text>
  <line x1="106" y1="300" x2="106" y2="354" stroke="#90caf9" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="106" y="408" text-anchor="middle" fill="#1565c0" font-size="10" font-weight="600">Datenquellen</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!--  PFEIL 1 → 2                                          -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <line x1="196" y1="180" x2="228" y2="180" stroke="#6c757d" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="212" y="170" text-anchor="middle" fill="#6c757d" font-size="9">ETL</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!--  STATION 2 – SSIS  cx=318                             -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="232" y="60" width="172" height="240" rx="10" fill="white" stroke="#ffcc80" stroke-width="2"/>
  <!-- Header -->
  <rect x="232" y="60" width="172" height="40" rx="10" fill="#e65100"/>
  <rect x="232" y="80" width="172" height="20" fill="#e65100"/>
  <text x="318" y="85" text-anchor="middle" fill="white" font-size="12" font-weight="700">② SSIS</text>

  <!-- Zahnrad -->
  <circle cx="318" cy="158" r="34" fill="#fff3e0" stroke="#ef6c00" stroke-width="1.5"/>
  <circle cx="318" cy="158" r="18" fill="#ffe0b2" stroke="#ef6c00" stroke-width="1.5"/>
  <!-- Zähne (8 Rechtecke, rotiert) -->
  <rect x="312" y="120" width="12" height="14" rx="2" fill="#ef6c00"/>
  <rect x="312" y="182" width="12" height="14" rx="2" fill="#ef6c00"/>
  <rect x="280" y="152" width="14" height="12" rx="2" fill="#ef6c00"/>
  <rect x="342" y="152" width="14" height="12" rx="2" fill="#ef6c00"/>
  <rect x="286" y="128" width="12" height="14" rx="2" fill="#ef6c00" transform="rotate(45,292,135)"/>
  <rect x="336" y="128" width="12" height="14" rx="2" fill="#ef6c00" transform="rotate(-45,342,135)"/>
  <rect x="286" y="174" width="12" height="14" rx="2" fill="#ef6c00" transform="rotate(-45,292,181)"/>
  <rect x="336" y="174" width="12" height="14" rx="2" fill="#ef6c00" transform="rotate(45,342,181)"/>
  <!-- ETL-Label im Zahnrad -->
  <text x="318" y="155" text-anchor="middle" fill="#bf360c" font-size="10" font-weight="700">ETL</text>
  <text x="318" y="168" text-anchor="middle" fill="#bf360c" font-size="8">Pipeline</text>

  <text x="318" y="218" text-anchor="middle" fill="#374151" font-size="10">Extraktion,</text>
  <text x="318" y="232" text-anchor="middle" fill="#374151" font-size="10">Transformation,</text>
  <text x="318" y="246" text-anchor="middle" fill="#374151" font-size="10">Laden (ETL)</text>
  <text x="318" y="263" text-anchor="middle" fill="#374151" font-size="10">Integration Services</text>
  <text x="318" y="279" text-anchor="middle" fill="#374151" font-size="10">Datenbereinigung</text>
  <text x="318" y="292" text-anchor="middle" fill="#374151" font-size="10">Workflows &amp; Pakete</text>

  <!-- Hotspot 2 -->
  <circle cx="318" cy="374" r="20" fill="#e65100" stroke="white" stroke-width="2.5"/>
  <text x="318" y="380" text-anchor="middle" fill="white" font-size="14" font-weight="800">2</text>
  <line x1="318" y1="300" x2="318" y2="354" stroke="#ffcc80" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="318" y="408" text-anchor="middle" fill="#e65100" font-size="10" font-weight="600">SSIS</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!--  PFEIL 2 → 3                                          -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <line x1="408" y1="180" x2="440" y2="180" stroke="#6c757d" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="424" y="170" text-anchor="middle" fill="#6c757d" font-size="9">Laden</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!--  STATION 3 – DB-ENGINE / DWH  cx=530                  -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="444" y="60" width="172" height="240" rx="10" fill="white" stroke="#b0bec5" stroke-width="2.5"/>
  <!-- Header -->
  <rect x="444" y="60" width="172" height="40" rx="10" fill="#37474f"/>
  <rect x="444" y="80" width="172" height="20" fill="#37474f"/>
  <text x="530" y="82" text-anchor="middle" fill="white" font-size="11" font-weight="700">③ Datenbank-Engine</text>
  <text x="530" y="95" text-anchor="middle" fill="#b0bec5" font-size="9">/ Data Warehouse</text>

  <!-- Großer Zylinder -->
  <ellipse cx="530" cy="142" rx="44" ry="13" fill="#cfd8dc" stroke="#546e7a" stroke-width="1.5"/>
  <rect x="486" y="142" width="88" height="70" fill="#eceff1" stroke="#546e7a" stroke-width="1.5"/>
  <ellipse cx="530" cy="212" rx="44" ry="13" fill="#b0bec5" stroke="#546e7a" stroke-width="1.5"/>
  <!-- Trennlinien -->
  <ellipse cx="530" cy="165" rx="44" ry="10" fill="none" stroke="#b0bec5" stroke-width="1" stroke-dasharray="5 3"/>
  <ellipse cx="530" cy="188" rx="44" ry="10" fill="none" stroke="#b0bec5" stroke-width="1" stroke-dasharray="5 3"/>
  <text x="530" y="173" text-anchor="middle" fill="#263238" font-size="10" font-weight="600">SQL Server</text>
  <text x="530" y="188" text-anchor="middle" fill="#455a64" font-size="9">Database Engine</text>
  <text x="530" y="202" text-anchor="middle" fill="#455a64" font-size="9">Data Warehouse</text>

  <text x="530" y="240" text-anchor="middle" fill="#374151" font-size="10">Zentrale Datenspeicherung</text>
  <text x="530" y="254" text-anchor="middle" fill="#374151" font-size="10">Tabellen, Sichten, Prozeduren</text>
  <text x="530" y="271" text-anchor="middle" fill="#374151" font-size="10">Verwaltung &amp; Bereitstellung</text>
  <text x="530" y="287" text-anchor="middle" fill="#374151" font-size="10">für weitere Analysen</text>

  <!-- Hotspot 3 -->
  <circle cx="530" cy="374" r="20" fill="#37474f" stroke="white" stroke-width="2.5"/>
  <text x="530" y="380" text-anchor="middle" fill="white" font-size="14" font-weight="800">3</text>
  <line x1="530" y1="300" x2="530" y2="354" stroke="#b0bec5" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="530" y="408" text-anchor="middle" fill="#37474f" font-size="10" font-weight="600">DB-Engine / DWH</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!--  PFEIL 3 → 4                                          -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <line x1="620" y1="180" x2="652" y2="180" stroke="#6c757d" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="636" y="170" text-anchor="middle" fill="#6c757d" font-size="9">Analyse</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!--  STATION 4 – SSAS  cx=742                             -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="656" y="60" width="172" height="240" rx="10" fill="white" stroke="#ce93d8" stroke-width="2"/>
  <!-- Header -->
  <rect x="656" y="60" width="172" height="40" rx="10" fill="#6a1b9a"/>
  <rect x="656" y="80" width="172" height="20" fill="#6a1b9a"/>
  <text x="742" y="85" text-anchor="middle" fill="white" font-size="12" font-weight="700">④ SSAS</text>

  <!-- Datenwürfel (Cube) -->
  <!-- Vorderseite -->
  <polygon points="742,118 790,134 790,182 742,198" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="1.5"/>
  <!-- Rechte Seite -->
  <polygon points="790,134 818,122 818,170 790,182" fill="#e1bee7" stroke="#7b1fa2" stroke-width="1.5"/>
  <!-- Obere Seite -->
  <polygon points="742,118 770,106 818,122 790,134" fill="#ce93d8" stroke="#7b1fa2" stroke-width="1.5"/>
  <!-- Rasterlinien Vorderseite -->
  <line x1="742" y1="144" x2="790" y2="160" stroke="#9c27b0" stroke-width="0.8" stroke-dasharray="3 2"/>
  <line x1="742" y1="171" x2="790" y2="182" stroke="#9c27b0" stroke-width="0.8" stroke-dasharray="3 2"/>
  <line x1="758" y1="118" x2="758" y2="198" stroke="#9c27b0" stroke-width="0.8" stroke-dasharray="3 2"/>
  <line x1="774" y1="126" x2="774" y2="194" stroke="#9c27b0" stroke-width="0.8" stroke-dasharray="3 2"/>

  <text x="742" y="228" text-anchor="middle" fill="#374151" font-size="10">Multidimensionale Analyse</text>
  <text x="742" y="242" text-anchor="middle" fill="#374151" font-size="10">Datenwürfel (Cubes)</text>
  <text x="742" y="259" text-anchor="middle" fill="#374151" font-size="10">Verdichtung &amp; Aggregation</text>
  <text x="742" y="275" text-anchor="middle" fill="#374151" font-size="10">KPI-Berechnungen</text>
  <text x="742" y="291" text-anchor="middle" fill="#374151" font-size="10">Trendauswertungen</text>

  <!-- Hotspot 4 -->
  <circle cx="742" cy="374" r="20" fill="#6a1b9a" stroke="white" stroke-width="2.5"/>
  <text x="742" y="380" text-anchor="middle" fill="white" font-size="14" font-weight="800">4</text>
  <line x1="742" y1="300" x2="742" y2="354" stroke="#ce93d8" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="742" y="408" text-anchor="middle" fill="#6a1b9a" font-size="10" font-weight="600">SSAS</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!--  PFEIL 4 → 5                                          -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <line x1="832" y1="180" x2="864" y2="180" stroke="#6c757d" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="848" y="170" text-anchor="middle" fill="#6c757d" font-size="9">Berichte</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!--  STATION 5 – SSRS  cx=954                             -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="868" y="60" width="172" height="240" rx="10" fill="white" stroke="#a5d6a7" stroke-width="2"/>
  <!-- Header -->
  <rect x="868" y="60" width="172" height="40" rx="10" fill="#1b5e20"/>
  <rect x="868" y="80" width="172" height="20" fill="#1b5e20"/>
  <text x="954" y="85" text-anchor="middle" fill="white" font-size="12" font-weight="700">⑤ SSRS</text>

  <!-- Monitor -->
  <rect x="904" y="112" width="100" height="70" rx="5" fill="#1b2838" stroke="#2e7d32" stroke-width="2"/>
  <rect x="910" y="118" width="88" height="58" rx="3" fill="#e8f5e9"/>
  <!-- Report-Inhalt auf Monitor -->
  <rect x="916" y="124" width="56" height="5" rx="2" fill="#2e7d32"/>
  <rect x="916" y="133" width="76" height="3" rx="1" fill="#c8e6c9"/>
  <rect x="916" y="140" width="68" height="3" rx="1" fill="#c8e6c9"/>
  <!-- Balken -->
  <rect x="916" y="149" width="10" height="18" rx="1" fill="#43a047"/>
  <rect x="930" y="155" width="10" height="12" rx="1" fill="#81c784"/>
  <rect x="944" y="146" width="10" height="21" rx="1" fill="#2e7d32"/>
  <rect x="958" y="152" width="10" height="15" rx="1" fill="#43a047"/>
  <rect x="972" y="143" width="10" height="24" rx="1" fill="#1b5e20"/>
  <!-- Standfuss -->
  <rect x="946" y="182" width="16" height="10" rx="2" fill="#455a64"/>
  <rect x="934" y="192" width="40" height="5" rx="2" fill="#37474f"/>

  <text x="954" y="226" text-anchor="middle" fill="#374151" font-size="10">Berichterstellung</text>
  <text x="954" y="240" text-anchor="middle" fill="#374151" font-size="10">Visualisierung im Browser</text>
  <text x="954" y="257" text-anchor="middle" fill="#374151" font-size="10">Dashboards &amp; Reports</text>
  <text x="954" y="273" text-anchor="middle" fill="#374151" font-size="10">Export (PDF, Excel, …)</text>
  <text x="954" y="289" text-anchor="middle" fill="#374151" font-size="10">Reporting Services</text>

  <!-- Hotspot 5 -->
  <circle cx="954" cy="374" r="20" fill="#1b5e20" stroke="white" stroke-width="2.5"/>
  <text x="954" y="380" text-anchor="middle" fill="white" font-size="14" font-weight="800">5</text>
  <line x1="954" y1="300" x2="954" y2="354" stroke="#a5d6a7" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="954" y="408" text-anchor="middle" fill="#1b5e20" font-size="10" font-weight="600">SSRS</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!--  BESCHRIFTUNGSLEISTE (unten)                           -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="20" y="305" width="1020" height="22" rx="6" fill="#e9ecef"/>
  <text x="106"  y="320" text-anchor="middle" fill="#495057" font-size="9" font-weight="600">Rohdaten</text>
  <text x="318"  y="320" text-anchor="middle" fill="#495057" font-size="9" font-weight="600">ETL-Pipeline</text>
  <text x="530"  y="320" text-anchor="middle" fill="#495057" font-size="9" font-weight="600">Speicherung &amp; Verwaltung</text>
  <text x="742"  y="320" text-anchor="middle" fill="#495057" font-size="9" font-weight="600">Analyse</text>
  <text x="954"  y="320" text-anchor="middle" fill="#495057" font-size="9" font-weight="600">Reporting</text>

  <!-- Äußerer Rahmen -->
  <rect x="1" y="1" width="1058" height="418" rx="10" fill="none" stroke="#adb5bd" stroke-width="1.5"/>
</svg>
