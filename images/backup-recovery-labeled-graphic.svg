<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 560" width="1120" height="560"
     font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="11" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0 0, 11 4, 0 8" fill="#64748b"/>
    </marker>
    <marker id="arrow-red" markerWidth="11" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0 0, 11 4, 0 8" fill="#dc2626"/>
    </marker>
    <marker id="arrow-time" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
    <filter id="sh">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#00000020"/>
    </filter>
    <filter id="sh-red">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#dc262630"/>
    </filter>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f1f5f9"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="gBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="gTeal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="gAmber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="gRed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#991b1b"/>
    </linearGradient>
  </defs>

  <!--
    RASTER
    ──────────────────────────────────────────────────────────────────
    Gesamt:        1120 × 560
    Titelleiste:   h=50, y=0
    Kästen:        y=68, h=310  (alle gleich)
    Kästen Ende:   y=378
    Zeitlinie:     y=410
    Hotspots:      cy=460
    Beschriftung:  y=487
    Pfeile (mitte der Kästen): y=68+155=223

    Station 1:  x=20,  w=200, cx=120
    Arrow gap:  x=222–252   (30px)
    Station 2:  x=254, w=200, cx=354
    Arrow gap:  x=456–486   (30px)
    Station 3:  x=488, w=200, cx=588
    Arrow gap:  x=690–782   (inkl. Crash-Zone 58px)
    Crash-Zone: x=694, w=84, cx=736
    Station 4:  x=784, w=312, cx=940
    ──────────────────────────────────────────────────────────────────
  -->

  <!-- Background -->
  <rect width="1120" height="560" rx="16" fill="url(#bgGrad)" stroke="#cbd5e1" stroke-width="1.5"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="1120" height="50" rx="16" fill="#1e293b"/>
  <rect x="0" y="34" width="1120" height="16" fill="#1e293b"/>
  <text x="560" y="32" text-anchor="middle" fill="white" font-size="16" font-weight="700" letter-spacing="1">
    Point-in-Time Recovery – Sicherungskette
  </text>

  <!-- ══════════════════════════════════════════════════════════ -->
  <!--  STATION 1 – FULL BACKUP                                  -->
  <!--  x=20  w=200  cx=120  y=68  h=310                        -->
  <!-- ══════════════════════════════════════════════════════════ -->
  <g filter="url(#sh)">
    <rect x="20" y="68" width="200" height="310" rx="12" fill="white" stroke="#93c5fd" stroke-width="2"/>
  </g>
  <!-- Header -->
  <rect x="20" y="68" width="200" height="48" rx="12" fill="url(#gBlue)"/>
  <rect x="20" y="92"  width="200" height="24" fill="url(#gBlue)"/>
  <text x="120" y="91"  text-anchor="middle" fill="white" font-size="13" font-weight="700">Full Backup</text>
  <text x="120" y="108" text-anchor="middle" fill="#bfdbfe" font-size="10">Vollständige Sicherung</text>

  <!-- Cylinder icon, top: 132, bottom: 200 -->
  <ellipse cx="120" cy="150" rx="46" ry="13" fill="#bfdbfe" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="74" y="150" width="92" height="58" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <ellipse cx="120" cy="208" rx="46" ry="13" fill="#93c5fd" stroke="#3b82f6" stroke-width="1.5"/>
  <ellipse cx="120" cy="169" rx="46" ry="9" fill="none" stroke="#93c5fd" stroke-width="1" stroke-dasharray="4 3"/>
  <ellipse cx="120" cy="189" rx="46" ry="9" fill="none" stroke="#93c5fd" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="120" y="176" text-anchor="middle" fill="#1e40af" font-size="11" font-weight="700">100 %</text>
  <text x="120" y="193" text-anchor="middle" fill="#1e40af" font-size="10">alle Daten</text>

  <!-- Description text -->
  <text x="120" y="237" text-anchor="middle" fill="#374151" font-size="11">Basis für alle weiteren</text>
  <text x="120" y="253" text-anchor="middle" fill="#374151" font-size="11">Sicherungen</text>

  <!-- Badge -->
  <rect x="60" y="268" width="120" height="22" rx="11" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="120" y="283" text-anchor="middle" fill="#1d4ed8" font-size="10" font-weight="700">BASIS</text>

  <!-- Connector line (box bottom → timeline) -->
  <line x1="120" y1="378" x2="120" y2="403" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4 3"/>
  <circle cx="120" cy="410" r="7" fill="#3b82f6" stroke="white" stroke-width="2"/>

  <!-- Hotspot -->
  <circle cx="120" cy="460" r="22" fill="url(#gBlue)" stroke="white" stroke-width="3" filter="url(#sh)"/>
  <text x="120" y="467" text-anchor="middle" fill="white" font-size="16" font-weight="800">1</text>
  <text x="120" y="490" text-anchor="middle" fill="#1d4ed8" font-size="10" font-weight="600">Vollständige Sicherung</text>
  <text x="120" y="504" text-anchor="middle" fill="#64748b" font-size="10">T₀</text>

  <!-- ══════════════════════════════════════════════════════════ -->
  <!--  ARROW 1 → 2                                              -->
  <!-- ══════════════════════════════════════════════════════════ -->
  <line x1="222" y1="223" x2="252" y2="223" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="237" y="214" text-anchor="middle" fill="#94a3b8" font-size="9">baut auf</text>

  <!-- ══════════════════════════════════════════════════════════ -->
  <!--  STATION 2 – DIFFERENTIAL BACKUP                          -->
  <!--  x=254  w=200  cx=354  y=68  h=310                       -->
  <!-- ══════════════════════════════════════════════════════════ -->
  <g filter="url(#sh)">
    <rect x="254" y="68" width="200" height="310" rx="12" fill="white" stroke="#5eead4" stroke-width="2"/>
  </g>
  <!-- Header -->
  <rect x="254" y="68" width="200" height="48" rx="12" fill="url(#gTeal)"/>
  <rect x="254" y="92"  width="200" height="24" fill="url(#gTeal)"/>
  <text x="354" y="91"  text-anchor="middle" fill="white" font-size="13" font-weight="700">Differential Backup</text>
  <text x="354" y="108" text-anchor="middle" fill="#99f6e4" font-size="10">Differentielle Sicherung</text>

  <!-- Delta bar chart -->
  <!-- Row label Full -->
  <text x="272" y="142" fill="#475569" font-size="10" font-weight="600">Full:</text>
  <rect x="308" y="129" width="128" height="18" rx="4" fill="#99f6e4" stroke="#0d9488" stroke-width="1"/>
  <text x="372" y="142" text-anchor="middle" fill="#065f46" font-size="9" font-weight="600">alle Daten (T₀)</text>

  <!-- Row label Diff -->
  <text x="272" y="172" fill="#475569" font-size="10" font-weight="600">Diff:</text>
  <rect x="308" y="159" width="128" height="18" rx="4" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="1"/>
  <rect x="376" y="159" width="60"  height="18" rx="0" fill="#5eead4" stroke="#0d9488" stroke-width="1"/>
  <rect x="432" y="159" width="4"   height="18" rx="4" fill="#5eead4" stroke="#0d9488" stroke-width="1"/>
  <text x="342" y="172" text-anchor="middle" fill="#94a3b8" font-size="9">unverändert</text>
  <text x="404" y="172" text-anchor="middle" fill="#065f46" font-size="9" font-weight="700">Δ neu</text>

  <!-- Delta symbol -->
  <text x="354" y="210" text-anchor="middle" fill="#0f766e" font-size="32" font-weight="200">Δ</text>

  <!-- Description -->
  <text x="354" y="238" text-anchor="middle" fill="#374151" font-size="11">Änderungen seit dem</text>
  <text x="354" y="254" text-anchor="middle" fill="#374151" font-size="11">letzten Full Backup</text>

  <!-- Badge -->
  <rect x="264" y="270" width="180" height="22" rx="11" fill="#ccfbf1" stroke="#5eead4" stroke-width="1"/>
  <text x="354" y="285" text-anchor="middle" fill="#0f766e" font-size="10" font-weight="700">schnellere Restore-Zeit</text>

  <!-- Connector -->
  <line x1="354" y1="378" x2="354" y2="403" stroke="#0d9488" stroke-width="1.5" stroke-dasharray="4 3"/>
  <circle cx="354" cy="410" r="7" fill="#0d9488" stroke="white" stroke-width="2"/>

  <!-- Hotspot -->
  <circle cx="354" cy="460" r="22" fill="url(#gTeal)" stroke="white" stroke-width="3" filter="url(#sh)"/>
  <text x="354" y="467" text-anchor="middle" fill="white" font-size="16" font-weight="800">2</text>
  <text x="354" y="490" text-anchor="middle" fill="#0d9488" font-size="10" font-weight="600">Differentielle Sicherung</text>
  <text x="354" y="504" text-anchor="middle" fill="#64748b" font-size="10">T₁</text>

  <!-- ══════════════════════════════════════════════════════════ -->
  <!--  ARROW 2 → 3                                              -->
  <!-- ══════════════════════════════════════════════════════════ -->
  <line x1="456" y1="223" x2="486" y2="223" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="471" y="214" text-anchor="middle" fill="#94a3b8" font-size="9">baut auf</text>

  <!-- ══════════════════════════════════════════════════════════ -->
  <!--  STATION 3 – LOG BACKUP                                   -->
  <!--  x=488  w=200  cx=588  y=68  h=310                       -->
  <!-- ══════════════════════════════════════════════════════════ -->
  <g filter="url(#sh)">
    <rect x="488" y="68" width="200" height="310" rx="12" fill="white" stroke="#fcd34d" stroke-width="2"/>
  </g>
  <!-- Header -->
  <rect x="488" y="68" width="200" height="48" rx="12" fill="url(#gAmber)"/>
  <rect x="488" y="92"  width="200" height="24" fill="url(#gAmber)"/>
  <text x="588" y="91"  text-anchor="middle" fill="white" font-size="13" font-weight="700">Log Backup</text>
  <text x="588" y="108" text-anchor="middle" fill="#fde68a" font-size="10">Transaktionsprotokoll-Sicherung</text>

  <!-- Scroll icon, top ellipse: cy=142, body: 142–218 -->
  <ellipse cx="588" cy="142" rx="54" ry="10" fill="#fde68a" stroke="#f59e0b" stroke-width="1.5"/>
  <rect x="534" y="142" width="108" height="76" rx="0" fill="#fef9c3" stroke="#f59e0b" stroke-width="1.5"/>
  <rect x="534" y="218" width="108" height="0" rx="0" fill="#fef9c3"/>
  <ellipse cx="588" cy="218" rx="54" ry="10" fill="#fde68a" stroke="#f59e0b" stroke-width="1.5"/>
  <!-- Log lines inside scroll -->
  <rect x="546" y="153" width="84" height="6" rx="2" fill="#fbbf24"/>
  <rect x="546" y="165" width="68" height="6" rx="2" fill="#fde68a"/>
  <rect x="546" y="177" width="76" height="6" rx="2" fill="#fbbf24"/>
  <rect x="546" y="189" width="58" height="6" rx="2" fill="#fde68a"/>
  <rect x="546" y="201" width="72" height="6" rx="2" fill="#fbbf24"/>

  <!-- Description -->
  <text x="588" y="248" text-anchor="middle" fill="#374151" font-size="11">Alle Transaktionen seit</text>
  <text x="588" y="264" text-anchor="middle" fill="#374151" font-size="11">letzter Protokoll-Sicherung</text>

  <!-- Badge -->
  <rect x="498" y="278" width="180" height="22" rx="11" fill="#fef3c7" stroke="#fcd34d" stroke-width="1"/>
  <text x="588" y="293" text-anchor="middle" fill="#92400e" font-size="10" font-weight="700">beliebiger Restore-Zeitpunkt</text>

  <!-- Connector -->
  <line x1="588" y1="378" x2="588" y2="403" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4 3"/>
  <circle cx="588" cy="410" r="7" fill="#f59e0b" stroke="white" stroke-width="2"/>

  <!-- Hotspot -->
  <circle cx="588" cy="460" r="22" fill="url(#gAmber)" stroke="white" stroke-width="3" filter="url(#sh)"/>
  <text x="588" y="467" text-anchor="middle" fill="white" font-size="16" font-weight="800">3</text>
  <text x="588" y="490" text-anchor="middle" fill="#b45309" font-size="10" font-weight="600">Protokoll-Sicherung</text>
  <text x="588" y="504" text-anchor="middle" fill="#64748b" font-size="10">T₂</text>

  <!-- ══════════════════════════════════════════════════════════ -->
  <!--  CRASH ZONE  x=694  w=84  cx=736                         -->
  <!-- ══════════════════════════════════════════════════════════ -->
  <rect x="694" y="68" width="84" height="310" rx="8"
        fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5" stroke-dasharray="6 4"/>
  <!-- Lightning bolt centered at cx=736 -->
  <polygon points="740,90 726,148 739,148 724,198 754,140 740,140"
           fill="#ef4444" stroke="#991b1b" stroke-width="1.5"/>
  <text x="736" y="220" text-anchor="middle" fill="#dc2626" font-size="10" font-weight="800">CRASH</text>

  <!-- Connector -->
  <line x1="736" y1="378" x2="736" y2="403" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4 3"/>
  <circle cx="736" cy="410" r="7" fill="#dc2626" stroke="white" stroke-width="2"/>
  <text x="736" y="490" text-anchor="middle" fill="#dc2626" font-size="10" font-weight="700">Absturz</text>

  <!-- ══════════════════════════════════════════════════════════ -->
  <!--  ARROW 3 → 4 (red dashed, runs above crash zone)         -->
  <!-- ══════════════════════════════════════════════════════════ -->
  <line x1="690" y1="223" x2="782" y2="223" stroke="#dc2626" stroke-width="2.5"
        stroke-dasharray="7 4" marker-end="url(#arrow-red)"/>
  <text x="736" y="213" text-anchor="middle" fill="#dc2626" font-size="9" font-weight="700">Notfall</text>

  <!-- ══════════════════════════════════════════════════════════ -->
  <!--  STATION 4 – TAIL-LOG BACKUP                              -->
  <!--  x=784  w=312  cx=940  y=68  h=310                       -->
  <!-- ══════════════════════════════════════════════════════════ -->
  <g filter="url(#sh-red)">
    <rect x="784" y="68" width="316" height="310" rx="12" fill="#fff1f2" stroke="#ef4444" stroke-width="3"/>
  </g>
  <!-- Header -->
  <rect x="784" y="68" width="316" height="48" rx="12" fill="url(#gRed)"/>
  <rect x="784" y="92"  width="316" height="24" fill="url(#gRed)"/>
  <text x="942" y="91"  text-anchor="middle" fill="white" font-size="13" font-weight="700">Tail-Log Backup</text>
  <text x="942" y="108" text-anchor="middle" fill="#fca5a5" font-size="10">⚠ Tail-Log-Sicherung (Notfall)</text>

  <!-- NOTFALL badge, right side of header -->
  <rect x="940" y="72" width="150" height="20" rx="10" fill="#991b1b"/>
  <text x="1015" y="86" text-anchor="middle" fill="white" font-size="9" font-weight="800">NOTFALL-SCHRITT</text>

  <!-- Log scroll icon (red), wider -->
  <ellipse cx="942" cy="142" rx="74" ry="11" fill="#fecaca" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="868" y="142" width="148" height="86" rx="0" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <ellipse cx="942" cy="228" rx="74" ry="11" fill="#fecaca" stroke="#ef4444" stroke-width="1.5"/>
  <!-- Log lines -->
  <rect x="882" y="153" width="120" height="6" rx="2" fill="#fca5a5"/>
  <rect x="882" y="165" width="100" height="6" rx="2" fill="#fca5a5"/>
  <rect x="882" y="177" width="112" height="6" rx="2" fill="#ef4444"/>
  <rect x="882" y="189" width="88"  height="6" rx="2" fill="#ef4444"/>
  <!-- Last fragment highlight bar -->
  <rect x="882" y="202" width="120" height="14" rx="3" fill="#dc2626"/>
  <text x="942" y="213" text-anchor="middle" fill="white" font-size="9" font-weight="800">← letztes Fragment</text>

  <!-- Description -->
  <text x="942" y="258" text-anchor="middle" fill="#7f1d1d" font-size="12" font-weight="700">Kein Datenverlust!</text>
  <text x="942" y="275" text-anchor="middle" fill="#374151" font-size="11">Sichert Transaktionen nach dem</text>
  <text x="942" y="291" text-anchor="middle" fill="#374151" font-size="11">letzten Log Backup bis zum Absturz</text>

  <!-- Badge -->
  <rect x="844" y="305" width="196" height="22" rx="11" fill="#fecaca" stroke="#fca5a5" stroke-width="1"/>
  <text x="942" y="320" text-anchor="middle" fill="#991b1b" font-size="10" font-weight="700">nur im Notfall, vor dem Restore</text>

  <!-- Connector -->
  <line x1="942" y1="378" x2="942" y2="403" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4 3"/>
  <circle cx="942" cy="410" r="7" fill="#ef4444" stroke="white" stroke-width="2"/>

  <!-- Hotspot -->
  <circle cx="942" cy="460" r="22" fill="url(#gRed)" stroke="white" stroke-width="3" filter="url(#sh-red)"/>
  <text x="942" y="467" text-anchor="middle" fill="white" font-size="16" font-weight="800">4</text>
  <text x="942" y="490" text-anchor="middle" fill="#dc2626" font-size="10" font-weight="600">Tail-Log-Sicherung</text>
  <text x="942" y="504" text-anchor="middle" fill="#64748b" font-size="10">T₃</text>

  <!-- ══════════════════════════════════════════════════════════ -->
  <!--  TIMELINE                                                 -->
  <!-- ══════════════════════════════════════════════════════════ -->
  <line x1="36" y1="410" x2="1088" y2="410" stroke="#94a3b8" stroke-width="2"
        marker-end="url(#arrow-time)"/>
  <text x="1100" y="415" fill="#94a3b8" font-size="11" font-weight="600">t</text>

  <!-- Outer border -->
  <rect x="1" y="1" width="1118" height="558" rx="16" fill="none" stroke="#cbd5e1" stroke-width="1.5"/>
</svg>
